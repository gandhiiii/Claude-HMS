<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css?v=38">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .sidebar-logo { cursor: pointer; }
        #ambMapContainer { height: 400px; border-radius: var(--radius); z-index: 1; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--light-gray); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" onclick="Router.navigate(AUTH.currentUser()?.role === 'employee' ? 'employee-dashboard' : 'dashboard')">
                <span>🏥</span> HMS
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <main class="main-content">
            <header class="main-header" id="mainHeader"></header>
            <div class="page-content" id="pageContent"></div>
        </main>
    </div>

    <script src="js/data.js?v=38"></script>
    <script src="js/firebase-config.js?v=38"></script>
    <script src="js/sync.js?v=38"></script>
    <script src="js/app.js?v=38"></script>
    <script src="js/modules/dashboard-module.js?v=38"></script>
    <script src="js/modules/users.js?v=38"></script>
    <script src="js/modules/departments.js?v=38"></script>
    <script src="js/modules/feature-rights.js?v=38"></script>
    <script src="js/modules/inventory.js?v=38"></script>
    <script src="js/modules/gate-security.js?v=38"></script>
    <script src="js/modules/phase2.js?v=38"></script>
    <script src="js/modules/projects.js?v=38"></script>
    <script src="js/modules/ambulance.js?v=38"></script>
    <script src="js/modules/problems.js?v=38"></script>
    <script src="js/modules/tasks.js?v=38"></script>
    <script src="js/modules/complaints.js?v=38"></script>
    <script src="js/modules/room-checklist.js?v=38"></script>
    <script src="js/modules/admissions.js?v=38"></script>
    <script src="js/modules/lost-found.js?v=38"></script>
    <script src="js/modules/admin-checklist.js?v=38"></script>
    <script src="js/modules/checklists.js?v=38"></script>
    <script src="js/modules/material-requests.js?v=38"></script>
    <script src="js/modules/suggestions.js?v=38"></script>
    <script src="js/modules/budget.js?v=38"></script>
    <script src="js/modules/quarterly-priorities.js?v=38"></script>
    <script src="js/modules/reports.js?v=38"></script>
    <script src="js/modules/employee-dashboard.js?v=38"></script>
    <script src="js/modules/hod-dashboard.js?v=38"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            Router.init();
            setTimeout(function() { try { SYNC.init(); } catch(e) {} }, 300);
        });
    </script>
</body>
</html>
