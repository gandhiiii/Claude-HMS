<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hospital Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .spinner { width: 40px; height: 40px; border: 4px solid var(--light-gray); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .reset-section { display: none; }
        .reset-section.active { display: block; }
        .login-logo { font-size: 36px; text-align: center; margin-bottom: 8px; }
        .setup-section { display: none; }
        .setup-section.active { display: block; }
        .setup-badge { background: var(--secondary); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">🏥</div>
            <h1>Hospital Management</h1>
            <p class="subtitle">Admin Login Portal</p>

            <div id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" class="form-control" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="Enter password">
                </div>
                <button class="btn btn-primary btn-lg" style="width:100%;" onclick="handleLogin()">
                    Sign In
                </button>
                <div class="login-footer">
                    <a href="#" onclick="showReset()" style="font-size:13px;">Forgot Password? Reset Here</a>
                </div>
                <div id="loginError" style="color:var(--danger);font-size:13px;margin-top:8px;text-align:center;"></div>
            </div>

            <div id="resetForm" class="reset-section">
                <h3 style="margin-bottom:8px;">Reset Password</h3>
                <p style="font-size:13px;color:var(--gray);margin-bottom:16px;">
                    Enter your username, email, or phone number.
                </p>
                <div class="form-group">
                    <label>Username / Email / Phone</label>
                    <input type="text" id="resetIdentifier" class="form-control" placeholder="Enter username, email or phone">
                </div>
                <button class="btn btn-primary btn-lg" style="width:100%;" onclick="handleResetRequest()">
                    Send Reset Link
                </button>
                <div class="login-footer">
                    <a href="#" onclick="showLogin()" style="font-size:13px;">Back to Login</a>
                </div>
                <div id="resetResult" style="font-size:13px;margin-top:8px;text-align:center;"></div>
                <div id="resetLinkBox" style="display:none;margin-top:12px;padding:12px;background:#f0f8ff;border-radius:8px;border:1px solid #c2d7f8;">
                    <p style="font-size:13px;margin-bottom:8px;"><strong>Reset Token Generated</strong></p>
                    <div id="resetLinkDisplay" style="font-size:12px;word-break:break-all;background:white;padding:8px;border-radius:4px;"></div>
                    <div style="margin-top:12px;">
                        <label>New Password</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" style="margin-bottom:8px;">
                        <button class="btn btn-success" style="width:100%;" onclick="handlePasswordReset()">Set New Password</button>
                    </div>
                </div>
            </div>

            <div id="setupForm" class="setup-section">
                <div class="setup-badge">FIRST TIME SETUP</div>
                <h3 style="margin-bottom:4px;">Create Admin Account</h3>
                <p style="font-size:13px;color:var(--gray);margin-bottom:16px;">No accounts exist yet. Set up the first administrator account.</p>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="setupName" class="form-control" placeholder="e.g. Hospital Administrator">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="setupUser" class="form-control" placeholder="Choose a username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="setupPass" class="form-control" placeholder="Choose a password (min 6 chars)" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="setupPass2" class="form-control" placeholder="Re-enter password" autocomplete="new-password">
                </div>
                <button class="btn btn-primary btn-lg" style="width:100%;" onclick="handleSetup()">Create Admin &amp; Sign In</button>
                <div id="setupError" style="color:var(--danger);font-size:13px;margin-top:8px;text-align:center;"></div>
            </div>
        </div>
    </div>
    <script src="js/data.js?v=57"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/sync.js"></script>
    <script>
        // Redirect already-logged-in users; auto-recover from Firebase if localStorage was cleared
        (function() {
            try {
                var user = AUTH.currentUser();
                if (user) { window.location.replace('dashboard.html'); return; }
            } catch(e) {}

            var users = [];
            try { users = DB.get('users') || []; } catch(e) {}

            if (users.length === 0 && window.FB_DB) {
                // localStorage empty — pull from Firebase in the background.
                // Login form is ALWAYS kept visible; we never auto-hide it.
                var _errEl = document.getElementById('loginError');
                _errEl.style.color = 'var(--gray)';
                _errEl.textContent = '⟳ Connecting to database…';
                var _done = false;

                function _showSetupLink() {
                    _errEl.style.color = '#b45309';
                    _errEl.innerHTML = 'No accounts found in database.'
                        + '<br><span style="font-size:12px;color:var(--gray);">Ask admin to open the app on their device and refresh it, then '
                        + '<a href="#" onclick="location.reload();return false;" style="color:var(--primary);">retry</a>.'
                        + '</span>'
                        + '<br><span style="font-size:12px;color:var(--gray);margin-top:4px;display:block;">First time only: '
                        + '<a href="#" onclick="document.getElementById(\'loginForm\').style.display=\'none\';'
                        + 'document.getElementById(\'setupForm\').classList.add(\'active\');return false;" '
                        + 'style="color:var(--primary);">Create admin account →</a></span>';
                }

                var _t = setTimeout(function() {
                    if (_done) return;
                    _done = true;
                    _errEl.style.color = '#b45309';
                    _errEl.innerHTML = 'Database connection timed out. '
                        + '<a href="#" onclick="location.reload();return false;" style="color:var(--primary);">Tap to retry</a>';
                }, 8000);

                window.FB_DB.ref('hms').once('value').then(function(snap) {
                    if (_done) return;
                    _done = true;
                    clearTimeout(_t);
                    var remote = snap.val();
                    var hasUsers = remote && remote.users &&
                        (Array.isArray(remote.users) ? remote.users.length : Object.keys(remote.users).length) > 0;
                    if (hasUsers) {
                        Object.keys(remote).forEach(function(key) {
                            try { localStorage.setItem('hms_' + key, JSON.stringify(remote[key])); } catch(e2) {}
                        });
                        localStorage.setItem('hms_last_cloud_sync', new Date().toISOString());
                        _errEl.style.color = 'var(--secondary)';
                        _errEl.textContent = '✅ Data loaded. Please log in.';
                    } else {
                        _showSetupLink();
                    }
                }).catch(function() {
                    if (_done) return;
                    _done = true;
                    clearTimeout(_t);
                    _errEl.style.color = '#b45309';
                    _errEl.innerHTML = 'Database connection failed. '
                        + '<a href="#" onclick="location.reload();return false;" style="color:var(--primary);">Tap to retry</a>';
                });
            } else if (users.length === 0) {
                // No Firebase at all — true first install
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('setupForm').classList.add('active');
            }
        })();

        function handleSetup() {
            var name = (document.getElementById('setupName').value || '').trim();
            var uname = (document.getElementById('setupUser').value || '').trim();
            var pass = (document.getElementById('setupPass').value || '').trim();
            var pass2 = (document.getElementById('setupPass2').value || '').trim();
            var errEl = document.getElementById('setupError');
            errEl.textContent = '';
            if (!name) { errEl.textContent = 'Full name is required.'; return; }
            if (!uname || uname.length < 3) { errEl.textContent = 'Username must be at least 3 characters.'; return; }
            if (!pass || pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
            if (pass !== pass2) { errEl.textContent = 'Passwords do not match.'; return; }
            try {
                var admin = {
                    id: 'admin_' + Date.now(),
                    username: uname,
                    password: pass,
                    fullName: name,
                    email: '',
                    phone: '',
                    role: 'admin',
                    department: 'Administration',
                    isSuperAdmin: true,
                    permissions: ['all'],
                    createdAt: new Date().toISOString()
                };
                DB.set('users', [admin]);
                var result = AUTH.login(uname, pass);
                if (result.success) {
                    window.location.replace('dashboard.html');
                } else {
                    errEl.textContent = result.message;
                }
            } catch(e) {
                errEl.textContent = 'Setup error: ' + (e.message || e);
            }
        }

        var currentResetToken = null;

        function handleLogin() {
            var username = document.getElementById('loginUser').value.trim();
            var password = document.getElementById('loginPass').value.trim();
            var errEl = document.getElementById('loginError');
            errEl.textContent = '';
            if (!username || !password) {
                errEl.textContent = 'Please enter username and password';
                return;
            }
            try {
                var result = AUTH.login(username, password);
                if (result.success) {
                    window.location.replace('dashboard.html');
                } else {
                    errEl.textContent = result.message;
                }
            } catch(e) {
                errEl.textContent = 'Login error: ' + (e.message || e);
            }
        }

        document.getElementById('loginPass').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('loginUser').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        function showReset() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('resetForm').classList.add('active');
            document.getElementById('resetResult').textContent = '';
            document.getElementById('resetLinkBox').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('resetForm').classList.remove('active');
            document.getElementById('loginError').textContent = '';
        }

        function handleResetRequest() {
            var identifier = document.getElementById('resetIdentifier').value.trim();
            var resultEl = document.getElementById('resetResult');
            resultEl.style.color = '';
            if (!identifier) { resultEl.textContent = 'Please enter username, email or phone'; return; }
            try {
                var users = DB.get('users') || [];
                var user = users.find(function(u) {
                    return u.username === identifier || u.email === identifier || u.phone === identifier;
                });
                if (!user) { resultEl.textContent = 'No account found with that username, email or phone.'; return; }

                if (user.role === 'admin' || user.isSuperAdmin) {
                    // Admin: direct token-based reset (existing flow)
                    var result = AUTH.requestReset(identifier);
                    resultEl.textContent = result.message;
                    if (result.success) {
                        document.getElementById('resetLinkBox').style.display = 'block';
                        document.getElementById('resetLinkDisplay').textContent = 'Token: ' + result.token;
                        currentResetToken = result.token;
                    }
                } else {
                    // Non-admin: submit a reset request — admin will reset it from the Users module
                    var existing = (DB.get('pwResetRequests') || []).find(function(r) {
                        return r.userId === user.id && r.status === 'pending';
                    });
                    if (existing) {
                        resultEl.style.color = 'orange';
                        resultEl.textContent = 'A request is already pending. Please wait for the administrator to process it.';
                    } else {
                        DB.add('pwResetRequests', {
                            userId: user.id,
                            username: user.username,
                            fullName: user.fullName || user.username,
                            department: user.department || '',
                            role: user.role,
                            requestedAt: new Date().toISOString(),
                            status: 'pending'
                        });
                        resultEl.style.color = 'var(--secondary)';
                        resultEl.textContent = 'Your request has been sent to the administrator. They will reset your password and inform you.';
                    }
                }
            } catch(e) {
                resultEl.textContent = 'Error: ' + (e.message || e);
            }
        }

        function handlePasswordReset() {
            var newPass = document.getElementById('newPassword').value.trim();
            if (!newPass || newPass.length < 4) {
                document.getElementById('resetResult').textContent = 'Password must be at least 4 characters';
                return;
            }
            var result = AUTH.resetPassword(currentResetToken, newPass);
            document.getElementById('resetResult').textContent = result.message;
            if (result.success) { setTimeout(function() { showLogin(); }, 2000); }
        }

        window.addEventListener('load', function() {
            var params = new URLSearchParams(window.location.search);
            var resetToken = params.get('reset');
            if (resetToken) {
                var tokenData = AUTH.verifyResetToken(resetToken);
                if (tokenData) {
                    showReset();
                    document.getElementById('resetIdentifier').value = tokenData.username;
                    document.getElementById('resetLinkBox').style.display = 'block';
                    document.getElementById('resetLinkDisplay').textContent = 'Token verified! Set your new password below.';
                    currentResetToken = resetToken;
                    document.getElementById('resetResult').style.color = 'var(--secondary)';
                    document.getElementById('resetResult').textContent = 'Token verified successfully!';
                } else {
                    document.getElementById('resetResult').textContent = 'Invalid or expired token';
                    document.getElementById('resetResult').style.color = 'var(--danger)';
                }
            }
        });
    </script>
</body>
</html>
